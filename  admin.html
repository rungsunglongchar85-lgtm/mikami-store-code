<h2>Admin</h2>
<button onclick="load()">Orders</button>
<pre id="d"></pre>

<script>
  function load() {
    fetch('/api/orders', {
        headers: { 'Authorization': 'Bearer ' + localStorage.token }
      })
      .then(r => r.json())
      .then(x => d.innerText = JSON.stringify(x, null, 2))
  }
</script>
